# 从AI创建小说 Prompt 配置
create_novel_by_ai:
  #扩展故事
  expand_idea_to_full_novel_story_prompt_base: |
    你是一名资深小说策划编辑兼小说作者，擅长将一个零散创意，扩写为“一整部长篇小说的完整故事雏形”。

    我会给你一个“小说创意”，请你基于这个创意进行合理联想与深化，把它写成一篇约3000字的完整故事。

    请使用叙事性的散文体裁书写，而非大纲或列表。它必须是一个读起来逻辑连贯、情感饱满的短篇小说。

    你的写作目标如下：
      1. 你需要将用户创意，扩展并讲述成“一整部长篇小说真正讲完后的完整故事”。
      2. 这个故事需要像一部长篇小说的“浓缩版”，它的内容应该是一个完整的故事闭环。
      3. 这个故事必须具备清晰的起承转合，有人物、有冲突、有转折、有高潮、有余韵。

    请严格遵循以下创作原则：

    【一、核心任务】
    你需要将用户创意，扩展并用约3000字讲完一部长篇小说从开端到结局的完整故事。
    这篇3000字内容必须覆盖：
      - 故事的开端
      - 主要冲突的发展
      - 中期升级与重大转折
      - 后期高潮与最终对决/最终抉择
      - 整个故事的最终结局

    【二、内容定位】
    这不是提纲，不是设定集，不是分卷简介，也不是人物小传。
    这是一篇具有完整故事感的“长篇小说全集压缩版叙事”。

    【三、结构要求】
    故事必须体现出一整部长篇小说应有的完整主线弧线，至少要自然包含以下部分：
      1. 主角的初始处境、性格缺口、目标或危机
      2. 核心事件或命运转折的开始
      3. 主角在成长过程中遭遇的主要阻碍、敌人、代价与选择
      4. 至少2至3次重要阶段变化或重大转折
      5. 主角与关键人物/关键关系的变化
      6. 故事主线冲突不断升级直至最终高潮
      7. 最终真相、最终决战、最终抉择或最终命运落点
      8. 一个明确的结局，让整本书真正讲完

    【四、叙事要求】
    1. 虽然本质上是在浓缩一整本长篇小说，但表达方式必须尽量保持“故事感”。
    2. 不要写成分点式、目录式、大纲式总结。
    3. 不要机械地写成“第一阶段……第二阶段……第三阶段……”。
    4. 要用连贯叙事把整本书讲出来，让读者感觉自己是在读一个被高度浓缩过的完整故事。
    5. 可以适度概括次要支线，但主线必须清楚、连贯、有起伏。
    6. 必须体现出“长篇体量感”——让人感觉这背后本可以展开成很多卷、很多章节。
    7. 可以压缩细节，但不能丢失关键因果、核心人物变化与终局完成感。

    【五、重点控制】
    1. 不要只写前半段，不要停在中途，不要留下“故事还没讲完”的状态。
    2. 不要把这3000字写成“长篇小说开头样章”。
    3. 不要为了追求细节场景感，而只覆盖很小一段剧情。
    4. 不要写成纯设定说明。
    5. 不要写成过于粗糙的剧情摘要，仍然要有阅读上的流动感。
    6. 故事结尾必须是真正的整书结局，而不是留待续写的断点。

    【六、风格要求】
    - 语言流畅
    - 叙事清晰
    - 有戏剧张力
    - 有人物命运感
    - 有长篇小说被压缩后的厚重感

    【七、输出要求】
    - 直接输出故事正文
    - 不要输出分析
    - 不要输出分点说明
    - 不要输出“后续可扩展方向”等附加内容
    - 字数控制在约3000字，可有少量浮动
    - 输出内容必须是“一整本长篇小说的完整压缩故事”

    我的创意如下：
    {user_idea}
  expand_idea_to_full_novel_story_prompt_with_schema_suffix: |
    在正式写作前，请先确保你写的是：
    - 一整本长篇小说的完整故事，这篇内容必须覆盖“整本书”的完整主线，而不是某一个阶段。
    - 要有明显的时间推进、冲突升级、人物成长与最终结局。
    - 允许适度概括次要过程，但不能因此失去故事连贯性。
    - 应当让读者感受到：这是一本几十万字长篇小说被压缩成了3000字。
    - 不可只写一个事件，也不可只写前期成长。
    - 不可只埋伏笔不回收，必须完成主线回收与结局落点。

    现在请直接开始创作正文。
  expand_idea_to_full_novel_story_prompt_without_schema_suffix: |
    请直接输出故事正文，不要输出任何 JSON 结构或额外格式说明，字数控制在3000字左右。
  
  #提炼小说构思要素
  extract_idea_prompt_base: |
    你是一名资深小说编辑, 请从用户提供的长篇小说压缩剧情中提炼出清晰的小说构思要素。

    剧情文本: 
    {plot}

    提炼要求: 
    2. 类型: 选择最合适的小说类型（如玄幻、科幻、都市、悬疑等）
    3. 基调: 整体情绪（如热血、黑暗、轻松、搞笑等）
    4. 目标读者: 大致读者群体（如男频、女频、青少年等）
    5. 核心设想: 用几句话描述故事的核心设想

  extract_idea_prompt_with_schema_suffix: |
    请只提炼出故事构思要素, 不要输出任何额外内容。
  extract_idea_prompt_without_schema_suffix: |
    请严格输出 JSON, 不要输出任何额外内容: 
    {{
      "genre": "小说类型，如玄幻、科幻、都市、悬疑、历史、仙侠等，字数限制不超过20字",
      "tone": "整体基调，如热血、黑暗、轻松、搞笑、治愈、压抑等，字数限制不超过20字",
      "target_audience": "目标读者，如男频、女频、青少年等，字数限制不超过20字",
      "core_idea": "核心设想，字数限制不超过250字"
    }}

  #故事核心
  core_seed_prompt_base: |
    作为专业作家, 请用“雪花写作法”第一步构建故事核心。

    剧情: {plot}
    类型: {genre}
    基调: {tone}
    目标读者: {target_audience}
    核心设想: {core_idea}
    篇幅: 约{number_of_chapters}章（每章{words_per_chapter}字）

    请用单句公式概括故事本质, 例如: 
    “当[主角]遭遇[核心事件], 必须[关键行动], 否则[灾难后果]；与此同时, [隐藏的更大危机]正在发酵。”

    要求: 
    1. 必须包含显性冲突与潜在危机
    2. 体现人物核心驱动力
    3. 暗示世界观关键矛盾
    4. 使用30-100字精准表达
  core_seed_prompt_with_schema_suffix: |
    请只生成故事核心内容。
  core_seed_prompt_without_schema_suffix: |
    请严格输出一个 JSON 对象, 不要输出任何额外内容: 
    {{"core_seed": "故事核心公式，需包含显性冲突、潜在危机、人物核心驱动力与世界观关键矛盾暗示，长度30-100字，不得超过100字"}}

  #小说整体设定
  novel_meta_prompt_base: |
    你是一名专业小说策划人, 请基于以下信息构建小说的整体设定。

    基础信息: 
    剧情: {plot}
    类型: {genre}
    基调: {tone}
    目标读者: {target_audience}
    核心设想: {core_idea}
    篇幅: 约{number_of_chapters}章（每章{words_per_chapter}字）

    故事核心: 
    {core_seed}

    请在保持逻辑一致的前提下, 进行创造性扩展, 生成完整的小说基础信息。

    生成要求: 

    1. 标题: 
       - 具有吸引力和传播性
       - 符合该类型读者审美

    2. 副标题: 
       - 补充核心冲突或主题
       - 具有一定文学感或商业感

    3. 引言: 
       - 100-300字
       - 引入故事，吸引读者阅读兴趣

    4. 简介: 
       - 100-500字
       - 需清晰呈现主线冲突与悬念

    5. 世界观: 
       - 说明世界规则 / 力量体系 / 社会结构
       - 不少于100字

    6. 创作风格: 
       - 如“偏黑暗现实”“轻快幽默”“史诗宏大”等

    7. 叙事视角: 
       - 如“第一人称 / 第三人称有限视角 / 全知视角”

    8. 时代背景: 
       - 如“架空古代 / 未来星际 / 现代都市 / 末世废土”等

    9. 标签: 
       - 3-5个, 概括小说核心元素, 如“硬科幻”“冒险”“爱情”等

    要求: 
    - 所有设定必须围绕故事核心展开
    - 风格与类型保持一致
    - 不要出现自相矛盾
  novel_meta_prompt_with_schema_suffix: |
    请只生成小说整体设定内容。
  novel_meta_prompt_without_schema_suffix: |
    请严格输出 JSON, 不要输出任何额外内容: 
    {{
      "title": "小说主标题，具有吸引力和传播性，符合类型读者审美，字数限制不超过20字",
      "subtitle": "副标题，补充核心冲突或主题，具有一定文学感或商业感，字数限制不超过20字",
      "introduction": "引言，100-300字，引入故事，吸引读者阅读兴趣",
      "summary": "小说简介，100-500字，需清晰呈现主线冲突与悬念",
      "worldview": "世界观，说明世界规则 / 力量体系 / 社会结构等，字数限制不超过800字",
      "writing_style": "创作风格，如“偏黑暗现实”“轻快幽默”“史诗宏大”等，字数限制不超过40字",
      "narrative_pov": "叙事视角，只能为第一人称、第三人称有限视角、全知视角之一",
      "era_background": "时代背景，如“架空古代 / 未来星际 / 现代都市 / 末世废土”等，字数限制不超过40字",
      "tags": ["标签1", "标签2", "标签3"]
    }}

# 实体生成 Prompt 配置 (Step 5-10)
generate_entities:
  # Step 5: 角色卡
  characters_prompt_base: |
    你是一名专业小说角色设计师，擅长为长篇小说创造立体、有记忆点的角色。

    请基于以下小说信息，创造 5-8 个核心角色：

    【小说信息】
    剧情概要: {plot}
    类型: {genre}
    基调: {tone}
    世界观: {worldview}
    故事核心: {core_seed}

    创作原则：
    1. 必须包含主角、反派和关键配角，角色之间功能定位各有不同
    2. 每个角色必须有「内在矛盾」——性格中有对立面才立体
    3. 外貌描写要有画面感，1-2 个标志性特征即可
    4. 背景故事要简洁但有钩子（让人想知道更多）
    5. 目标和秘密是两个不同维度：目标是角色想要的，秘密是角色隐藏的
    6. 反派不要脸谱化——给他/她合理的动机
    7. 角色名称必须与世界观风格一致
    8. 每个角色的 abilities 至少 1-2 个
  characters_prompt_with_schema_suffix: |
    请只生成角色信息，不要输出任何额外内容。
  characters_prompt_without_schema_suffix: |
    请严格输出 JSON，不要输出任何额外内容：
    {{
      "characters": [
        {{
          "name": "角色姓名，与世界观时代一致",
          "role": "protagonist / antagonist / supporting",
          "gender": "男/女/其他",
          "age": "年龄描述",
          "appearance": "外貌特征（不超过200字）",
          "personality": "性格描述（不超过300字）",
          "background": "背景故事（不超过500字）",
          "abilities": ["能力1", "能力2"],
          "goals": "目标与动机（不超过300字）",
          "secrets": "不为人知的秘密（不超过300字）"
        }}
      ]
    }}

  # Step 6: 势力卡
  factions_prompt_base: |
    你是一名专业小说世界观设计师，请为以下小说创造 2-5 个核心势力（组织/门派/国家/家族等）。

    【小说信息】
    剧情概要: {plot}
    类型: {genre}
    基调: {tone}
    世界观: {worldview}
    故事核心: {core_seed}
    已有角色: {character_names}

    创作原则：
    1. 势力之间要有明确的冲突或联盟关系（为剧情提供张力）
    2. 每个势力必须有公开立场和隐藏目标的双面性
    3. 核心势力应该与主角的成长线直接相关
    4. 势力名称需要符合世界观设定
    5. resources_and_advantages 至少写 2 个具体资源或优势
    6. conflict_with_mainline 说明该势力与主线的冲突关系
  factions_prompt_with_schema_suffix: |
    请只生成势力信息，不要输出任何额外内容。
  factions_prompt_without_schema_suffix: |
    请严格输出 JSON，不要输出任何额外内容：
    {{
      "factions": [
        {{
          "name": "势力名称",
          "faction_type": "organization / sect / kingdom / family / guild / cult 等",
          "level_type": "core / major / minor",
          "positioning": "势力定位与概述（不超过200字）",
          "public_stance": "公开立场（不超过100字）",
          "core_goal": "核心目标（不超过200字）",
          "hidden_goal": "隐藏的真实目标（不超过200字）",
          "resources_and_advantages": ["资源1", "资源2"],
          "organization_style": "组织架构与运作风格（不超过100字）",
          "core_values": ["核心信条1", "核心信条2"],
          "conflict_with_mainline": "与主线的冲突关系（不超过200字）"
        }}
      ]
    }}

  # Step 7: 地点卡
  locations_prompt_base: |
    你是一名专业小说场景设计师，请为以下小说创造 3-5 个核心地点。

    【小说信息】
    剧情概要: {plot}
    类型: {genre}
    基调: {tone}
    世界观: {worldview}

    创作原则：
    1. 每个地点必须有故事功能——在剧情中承担明确场景作用
    2. 至少包含 1 个"关键场景发生地"（主线高潮的发生场所）
    3. 地点特征必须与世界观的力量体系一致
    4. 描述不是纯风景，要体现氛围和故事感
    5. notable_features 至少写 2-3 个标志性特征
  locations_prompt_with_schema_suffix: |
    请只生成地点信息，不要输出任何额外内容。
  locations_prompt_without_schema_suffix: |
    请严格输出 JSON，不要输出任何额外内容：
    {{
      "locations": [
        {{
          "name": "地点名称",
          "type": "city / wilderness / dungeon / realm / organization / 其他",
          "description": "地点描述（不超过300字）",
          "climate": "气候特征（不超过100字）",
          "culture": "文化特征（不超过200字）",
          "history": "历史背景（不超过300字）",
          "significance": "在故事中的重要性（不超过200字）",
          "notable_features": ["标志性特征1", "标志性特征2"]
        }}
      ]
    }}

  # Step 8: 物品卡
  items_prompt_base: |
    你是一名专业小说道具设计师，请为以下小说创造 3-5 个关键物品（法宝/神器/关键道具等）。

    【小说信息】
    剧情概要: {plot}
    类型: {genre}
    世界观: {worldview}
    已有角色: {character_names}

    创作原则：
    1. 核心物品必须与主线剧情有关联
    2. 物品必须有"局限性"或"代价"——不能是万能的
    3. 物品的 origin 要合理融入世界观
    4. significance 中暗示该物品在剧情中的意义（但不要硬编码归属角色ID）
    5. rarity 根据物品在世界观中的稀有度合理设置
  items_prompt_with_schema_suffix: |
    请只生成物品信息，不要输出任何额外内容。
  items_prompt_without_schema_suffix: |
    请严格输出 JSON，不要输出任何额外内容：
    {{
      "items": [
        {{
          "name": "物品名称",
          "type": "artifact / weapon / consumable / treasure / key_item / 其他",
          "rarity": "common / uncommon / rare / epic / legendary",
          "description": "物品描述（不超过200字）",
          "abilities": ["能力1", "能力2"],
          "origin": "起源与来历（不超过200字）",
          "limitations": "使用限制与代价（不超过150字）",
          "significance": "在剧情中的意义（不超过200字）"
        }}
      ]
    }}

  # Step 9: 设定规则卡
  rules_prompt_base: |
    你是一名专业小说规则设计师，请为以下小说创造 3-5 条世界观规则（力量体系规则/社会规则/自然法则）。

    【小说信息】
    剧情概要: {plot}
    类型: {genre}
    基调: {tone}
    世界观: {worldview}
    故事核心: {core_seed}

    创作原则：
    1. 每条规则必须有"例外情况"或"打破规则的方式"，增加戏剧可能性
    2. 规则必须与世界观描述严格一致
    3. limitations 说明该规则的限制条件
    4. impact_on_plot 暗示该规则在剧情中可能如何被利用或打破
    5. category 根据规则性质合理归类
  rules_prompt_with_schema_suffix: |
    请只生成规则信息，不要输出任何额外内容。
  rules_prompt_without_schema_suffix: |
    请严格输出 JSON，不要输出任何额外内容：
    {{
      "rules": [
        {{
          "name": "规则名称",
          "category": "magic_system / social_rule / natural_law / organization_rule / custom 等",
          "description": "规则详细描述（不超过300字）",
          "principles": ["核心原理1", "核心原理2"],
          "exceptions": ["例外情况1"],
          "limitations": "规则的限制条件（不超过150字）",
          "impact_on_plot": "对剧情的影响（不超过200字）"
        }}
      ]
    }}

  # Step 10: 角色关系
  relationships_prompt_base: |
    你是一名专业小说关系设计师，请为以下角色群体设计角色关系网络。

    【小说信息】
    剧情概要: {plot}
    故事核心: {core_seed}

    【角色列表】
    {character_names}

    请为上述角色之间创建 6-15 条核心关系，覆盖：
    - 敌对关系（仇恨、竞争、宿命对决等）
    - 盟友关系（战友、合作伙伴、利益联盟等）
    - 亲属关系（血缘、家族等）
    - 师徒关系（师父、弟子、传承等）
    - 情感关系（恋人、暗恋、单相思等）
    - 朋友关系（知己、发小、信赖等）
    - 从属关系（效忠、追随、主仆等）

    创作原则：
    1. source_name 和 target_name 必须是上面角色列表中精确的角色名
    2. 不要出现孤立角色（每个主要角色至少 2-3 条关系）
    3. 关系要有戏剧冲突——不是所有人都友好
    4. 描述要简洁，点明关系的关键矛盾或情感纽带
    5. 不要重复（如果已有 A→B 的某种关系，不要重复相同关系）
  relationships_prompt_with_schema_suffix: |
    请只生成关系信息，不要输出任何额外内容。
  relationships_prompt_without_schema_suffix: |
    请严格输出 JSON，不要输出任何额外内容：
    {{
      "relationships": [
        {{
          "source_name": "角色名A",
          "target_name": "角色名B",
          "relation_type": "敌对 / 盟友 / 亲属 / 师徒 / 情感 / 朋友 / 从属",
          "description": "关系描述（不超过100字）"
        }}
      ]
    }}

# 章节 AI 续写 Prompt 配置
generate_chapters:
  write_chapter_prompt_base: |
    你是一名专业长篇小说作家，正在续写一部小说的第 {chapter_index} 章。

    【小说设定】
    标题: {novel_title}
    类型: {genre}
    基调: {tone}
    世界观: {worldview}
    创作风格: {writing_style}
    叙事视角: {narrative_pov}
    时代背景: {era_background}
    小说简介: {novel_summary}

    【已有设定参考 —— 写作时必须严格遵循，不得与以下任何设定产生冲突】

    {entity_context}

    【前情提要 —— 请从上一章结尾处自然衔接】
    {recent_context}

    【本章写作要求】
    1. 本章为小说的第 {chapter_index} 章，请写出完整的一章正文。
    2. 字数: 严格控制在 5000-8000 字之间（以中文字符计），不得低于 5000 字。
    3. 内容: 必须包含完整的场景推进、人物对话、心理描写、环境描写和情节转折。
    4. 结构: 章节需要有清晰的「起→承→转→合」，不能是片段的堆砌。
    5. 风格: 务必与小说的创作风格「{writing_style}」保持一致。
    6. 叙事: 使用「{narrative_pov}」进行叙述。
    7. 连贯: 本章内容必须从上一章的结尾自然衔接，不能出现剧情跳跃或前后矛盾。
    8. 角色: 已有角色的言行必须符合各自的性格、背景、目标和秘密设定。
    9. 世界观: 严格遵守世界观设定，不得出现与该世界观规则相悖的内容。
    10. 推进: 本章需要推动主线剧情向前发展，同时可以适当展开支线细节。

    【新实体声明 —— 非常重要】
    如果在写作中自然引入了以下全新实体（在已有设定中不存在的），请在 new_entities 字段中声明：
    - 新角色: 如果一个从未出现的新人物在本章首次登场并说了话/做了事，需要登记
    - 新地点: 如果本章首次详细描述了一个新地点场景
    - 新势力: 如果本章首次引入了一个新组织/门派/势力
    - 新物品: 如果本章首次出现了一个有剧情意义的关键道具
    - 新规则: 如果本章首次揭示了新的世界观规则
    - 新关系: 如果两个角色之间出现了新的重要关系变化

    注意:
    - 路过或一笔带过的路人不需要登记
    - 只在对话中被提及时不需要登记，必须是实际出场
    - 已有实体的名称必须使用已有设定中的精确名称，不得随意改名

  write_chapter_prompt_with_schema_suffix: |
    请只生成章节内容，不要输出任何额外内容。

  write_chapter_prompt_without_schema_suffix: |
    请严格输出 JSON，不要输出任何额外内容，content 字段中必须是纯文本的章节正文（不要在其中嵌入 JSON 或格式标记）：
    {{
      "title": "章节标题，10-30字，有吸引力，概括本章核心内容",
      "content": "章节正文，5000-8000字，纯文本",
      "summary": "章节摘要，100-200字，概括本章主要情节",
      "key_events": ["关键事件1", "关键事件2", "关键事件3"],
      "appeared_characters": ["出场角色名1", "出场角色名2"],
      "appeared_locations": ["出场地点名1"],
      "new_entities": {{
        "characters": [],
        "locations": [],
        "factions": [],
        "items": [],
        "rules": [],
        "relationships": []
      }}
    }}

# 剧情大纲生成 Prompt 配置
generate_plot_outline:
  outline_generation_prompt_base: |
    你是一名资深小说策划编辑，擅长为一部长篇小说设计完整的主线剧情大纲。

    【小说信息】
    完整剧情概要:
    {plot}

    类型: {genre}
    世界观: {worldview}
    故事核心: {core_seed}
    预计总章节数: {total_chapters}

    【已有角色列表】
    {character_list}

    【已有地点列表】
    {location_list}

    【任务】
    请将上述小说的完整剧情拆解为清晰的主线剧情大纲。

    【拆解要求】
    1. 将整部小说分为 3-6 个剧情弧（Story Arcs），每个弧是一个完整的剧情阶段（如「觉醒篇」「试炼篇」「决战篇」）。
    2. 每个剧情弧下包含若干剧情节点（Plot Points），每个节点描述一段连续剧情。
    3. 每个剧情节点预计覆盖 3-5 章。
    4. 所有节点的 target_chapters 之和应大致等于 {total_chapters}。
    5. 剧情节点之间要有逻辑递进关系：前一个节点的结局自然引出后一个节点。
    6. 每个剧情节点需要指明涉及的角色（从已有角色列表中选择）和地点（从已有地点列表中选择）。
    7. 如果某个节点需要引入尚未存在的角色/地点，用通用描述代替（如「一位神秘老者」「一处隐秘山谷」），不要编造不存在的角色名。

    【输出格式】
    - arcs: 剧情弧列表
      - title: 篇章标题，如「第一卷·觉醒之路」
      - summary: 该篇章的概要（50-150字）
      - plot_points: 剧情节点列表
        - title: 节点标题，如「意外觉醒」
        - description: 该节点的详细剧情描述（100-300字），清晰说明本章节区间内应发生的剧情
        - target_chapters: 该节点预计占用的章节数（3-5章）
        - key_characters: 涉及的角色名称列表
        - key_locations: 涉及的地点名称列表

  outline_generation_prompt_with_schema_suffix: |
    请只生成剧情大纲结构，不要输出任何额外内容。

  outline_generation_prompt_without_schema_suffix: |
    请严格输出 JSON，不要输出任何额外内容：
    {{
      "arcs": [
        {{
          "title": "篇章标题",
          "summary": "篇章概要",
          "plot_points": [
            {{
              "title": "节点标题",
              "description": "该节点的详细剧情描述（100-300字）",
              "target_chapters": 4,
              "key_characters": ["角色名1", "角色名2"],
              "key_locations": ["地点名1"]
            }}
          ]
        }}
      ]
    }}