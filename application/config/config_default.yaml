# Default configuration for the application
# You can override these settings by creating a config.yaml file in the same directory
# Do not edit this file directly, as it may be overwritten during updates
"mongodb_url": "mongodb://localhost:27017"
"mongo_database_name": "my_database"
"mongo_timeout_ms": 5000

# LLM 大模型配置
# 每个 provider 条目的 key 是用户自定义的别名，type 指定客户端类别（openai / gemini / claude）
# 同一个 type 可以定义多个不同别名的配置，方便在不同场景使用不同模型
# 每个 provider 可选配置生成参数默认值（temperature / top_p / max_tokens / system_prompt 等），
# 请求级别的参数会覆盖 provider 级别的默认值
llm:
  default_provider: deepseek_chat
  format_review_provider: deepseek_chat
  providers:
    openai_gpt4o_mini:
      type: openai
      base_url: "https://api.openai.com/v1"
      api_key: ""
      default_model: "gpt-4o-mini"
      enabled: false
      connect_timeout_seconds: 10
      read_timeout_seconds: 300
      max_retries: 2
      max_concurrency: 5
      use_system_proxy: false
      supports_streaming: true
      supports_json_schema: true
      supports_function_calling: true
      # 生成参数默认值（可选，不设置则由模型自行决定）
      # temperature: 0.7
      # top_p: 0.9
      # max_tokens: 4096
      # system_prompt: ""
      # presence_penalty: 0.0
      # frequency_penalty: 0.0
    deepseek_chat:
      type: openai
      base_url: "https://api.deepseek.com/v1"
      api_key: "你的deepseek api key"
      default_model: "deepseek-chat"
      enabled: true
      connect_timeout_seconds: 10
      read_timeout_seconds: 300
      max_retries: 2
      max_concurrency: 5
      use_system_proxy: false
      supports_streaming: true
      supports_json_schema: false
      supports_function_calling: false
    gemini_flash:
      type: gemini
      base_url: ""
      api_key: ""
      default_model: "gemini-3.1-flash-lite-preview"
      enabled: false
      connect_timeout_seconds: 10
      read_timeout_seconds: 300
      max_retries: 2
      max_concurrency: 5
      use_system_proxy: false
      supports_streaming: true
      supports_json_schema: true
      supports_function_calling: true
    claude_sonnet:
      type: claude
      base_url: ""
      api_key: ""
      default_model: "claude-sonnet-4-20250514"
      enabled: false
      connect_timeout_seconds: 10
      read_timeout_seconds: 300
      max_retries: 2
      max_concurrency: 5
      use_system_proxy: false
      supports_streaming: true
      supports_json_schema: true
      supports_function_calling: true
  # 在这里定义不同的工作流，每个工作流指定默认使用哪个 provider，以及每个步骤使用哪个 provider
  workflows:
    create_novel_by_ai:
      default_provider: deepseek_chat
      steps:
        expand_idea_to_full_novel_story:
          provider: deepseek_chat
        extract_idea:
          provider: deepseek_chat
        core_seed:
          provider: deepseek_chat
        novel_meta:
          provider: deepseek_chat
    generate_entities:
      default_provider: deepseek_chat
      steps:
        character_generation:
          provider: deepseek_chat
        faction_generation:
          provider: deepseek_chat
        location_generation:
          provider: deepseek_chat
        item_generation:
          provider: deepseek_chat
        rule_generation:
          provider: deepseek_chat
        relationship_generation:
          provider: deepseek_chat
    generate_chapters:
      default_provider: deepseek_chat
      steps:
        write_chapter:
          provider: deepseek_chat
    generate_plot_outline:
      default_provider: deepseek_chat
      steps:
        outline_generation:
          provider: deepseek_chat